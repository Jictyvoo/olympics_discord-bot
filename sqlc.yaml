version: "2"
sql:
  - name: "dbgen"
    engine: "sqlite"
    queries: "internal/infra/repositories/reposqlite/queries"
    schema: "./database/migrations/sqlite"
    gen:
      go:
        sql_package: database/sql
        package: "dbgen"
        out: "internal/infra/repositories/reposqlite/dbgen"
        emit_interface: false
        emit_json_tags: false
        emit_prepared_queries: false
        emit_empty_slices: true
        emit_exported_queries: true
        emit_pointers_for_null_types: false
        emit_db_tags: true
  - name: "dbgen"
    engine: "mysql"
    queries: "internal/infra/repositories/repomysql/queries"
    schema: "./database/migrations/mysql"
    gen:
      go:
        sql_package: database/sql
        package: "dbgen"
        out: "internal/infra/repositories/repomysql/dbgen"
        emit_interface: false
        emit_json_tags: false
        emit_prepared_queries: false
        emit_empty_slices: true
        emit_exported_queries: true
        emit_pointers_for_null_types: false
        emit_db_tags: true
