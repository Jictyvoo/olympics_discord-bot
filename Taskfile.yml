version: "3"

includes:
  tools:
    taskfile: ./tools/Taskfile.yml
    dir: ./tools
  build:
    taskfile: ./build/Taskfile.yml
    dir: ./build

vars:
  TEST_CMD: "go test ./..."

tasks:
  test:
    desc: Run the unit tests
    cmds:
      - "{{.TEST_CMD}}"

  test:race:
    desc: Run the unit tests with the race detector enabled
    cmds:
      - go test -race ./...

  install:deps:
    desc: Install pinned build tools through the tools module
    cmds:
      - task: tools:install

  default:
    desc: Default — run the lint + test suite
    cmds:
      - task: tools:vet
      - task: test
